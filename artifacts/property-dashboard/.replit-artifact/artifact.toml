kind = "web"
previewPath = "/"
title = "Property Portfolio Dashboard"
version = "1.0.0"
id = "artifacts/property-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20374
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/property-dashboard run dev"

[services.env]
PORT = "20374"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/property-dashboard", "run", "build"]
publicDir = "artifacts/property-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
